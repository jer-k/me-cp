name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Check Biome
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
